<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Registry | គ្រប់គ្រងទិន្នន័យ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@300;400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="container mt-4">
  <div class="text-center mb-5">
    <h1 class="header-title mb-2"><i class="fas fa-users-cog me-2"></i>គ្រប់គ្រងបញ្ជីឈ្មោះ</h1>
    <p class="text-light-emphasis">កែប្រែ និង លុបទិន្នន័យបានភ្លាមៗ</p>
  </div>

  <div class="glass-card">
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
      <div class="mb-2">
        <span class="badge bg-primary p-2 px-4 rounded-pill">សរុប៖ <span id="recordCount">0</span> នាក់</span>
      </div>
      <div class="col-md-5">
        <div class="input-group">
          <span class="input-group-text bg-transparent border-end-0 border-secondary"><i class="fas fa-search text-secondary"></i></span>
          <input type="text" id="searchInput" class="form-control search-box border-start-0" placeholder="ស្វែងរកឈ្មោះ ឬ អាស័យដ្ឋាន..." />
        </div>
      </div>
    </div>

    <div class="table-responsive">
      <table class="table-custom">
        <thead>
          <tr>
            <th class="text-center">#</th>
            <th>ឈ្មោះពេញ</th>
            <th>អាស័យដ្ឋាន</th>
            <th class="text-end">ថវិកា</th>
            <th class="text-center">សកម្មភាព</th>
          </tr>
        </thead>
        <tbody id="displayTableBody">
          <tr><td colspan="5" class="text-center py-5">កំពុងទាញទិន្នន័យ...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold"><i class="fas fa-edit me-2"></i>កែតម្រូវទិន្នន័យ</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <input type="hidden" id="editId" />
        <div class="mb-3">
          <label class="form-label opacity-75">ឈ្មោះពេញ</label>
          <input type="text" id="editName" class="form-control form-control-v2" />
        </div>
        <div class="mb-3">
          <label class="form-label opacity-75">អាស័យដ្ឋាន</label>
          <input type="text" id="editAddress" class="form-control form-control-v2" />
        </div>
        <div class="mb-3">
          <label class="form-label opacity-75">ថវិកា</label>
          <input type="number" id="editMoney" class="form-control form-control-v2" />
        </div>
        <button id="saveUpdateBtn" class="btn btn-info w-100 fw-bold rounded-pill p-3 mt-3">រក្សាទុកការផ្លាស់ប្តូរ</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script type="module" src="./script.js">
  
</script>

</body>
</html>
